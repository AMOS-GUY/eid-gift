<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Gift For You ✦</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --gold: #c9a96e;
        --gold-light: #e8d5a3;
        --gold-pale: #f5ecd4;
        --deep: #0d0d0f;
        --deep2: #13121a;
        --text: #f0ead6;
        --text-muted: #9e9484;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-bg-strong: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(201, 169, 110, 0.2);
        --glass-border-bright: rgba(255, 255, 255, 0.3);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        --glass-highlight: rgba(255, 255, 255, 0.1);
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        background: var(--deep);
        font-family: "DM Sans", sans-serif;
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }

      .bg-gradient {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse 80% 60% at 20% 10%,
            rgba(201, 169, 110, 0.12) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 80% at 80% 90%,
            rgba(120, 80, 180, 0.1) 0%,
            transparent 60%
          ),
          linear-gradient(160deg, #0d0d0f 0%, #13121a 40%, #0a0a12 100%);
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        animation: orbFloat 12s ease-in-out infinite;
        opacity: 0.5;
      }
      .orb-1 {
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(201, 169, 110, 0.25) 0%,
          transparent 70%
        );
        top: -150px;
        left: -100px;
        animation-delay: 0s;
      }
      .orb-2 {
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(130, 80, 200, 0.15) 0%,
          transparent 70%
        );
        bottom: -100px;
        right: -80px;
        animation-delay: -4s;
      }
      .orb-3 {
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(201, 169, 110, 0.12) 0%,
          transparent 70%
        );
        top: 50%;
        left: 60%;
        animation-delay: -8s;
      }

      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -40px) scale(1.05);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.95);
        }
      }

      .pattern {
        position: absolute;
        inset: 0;
        background-image:
          repeating-linear-gradient(
            45deg,
            transparent,
            transparent 40px,
            rgba(201, 169, 110, 0.025) 40px,
            rgba(201, 169, 110, 0.025) 41px
          ),
          repeating-linear-gradient(
            -45deg,
            transparent,
            transparent 40px,
            rgba(201, 169, 110, 0.025) 40px,
            rgba(201, 169, 110, 0.025) 41px
          );
      }

      .particles {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .particle {
        position: absolute;
        border-radius: 50%;
        background: var(--gold);
        animation: particleDrift linear infinite;
        opacity: 0;
      }
      @keyframes particleDrift {
        0% {
          transform: translateY(100vh) translateX(0);
          opacity: 0;
        }
        10% {
          opacity: 0.6;
        }
        90% {
          opacity: 0.3;
        }
        100% {
          transform: translateY(-10vh) translateX(40px);
          opacity: 0;
        }
      }

      .scene {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2.5rem;
        text-align: center;
      }

      /* Glass panel effect for the main scene */
      .scene::before {
        content: "";
        position: absolute;
        inset: -1rem;
        background: linear-gradient(
          135deg,
          var(--glass-bg) 0%,
          rgba(255, 255, 255, 0.02) 50%,
          var(--glass-bg-strong) 100%
        );
        border: 1px solid var(--glass-border);
        border-top: 1px solid var(--glass-border-bright);
        border-left: 1px solid var(--glass-border-bright);
        border-radius: 30px;
        backdrop-filter: blur(30px) saturate(180%);
        -webkit-backdrop-filter: blur(30px) saturate(180%);
        box-shadow: var(--glass-shadow);
        z-index: -1;
        opacity: 0;
        animation: fadeIn 1.2s ease 0.3s forwards;
      }

      .ornament {
        font-size: 2.4rem;
        margin-bottom: 1.8rem;
        opacity: 0;
        animation: fadeSlideDown 1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
        filter: drop-shadow(0 0 18px rgba(201, 169, 110, 0.5));
        letter-spacing: 0.4rem;
        color: var(--gold);
      }

      .tag {
        font-family: "Cinzel", serif;
        font-size: 0.63rem;
        letter-spacing: 0.38em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 1.5rem;
        opacity: 0;
        animation: fadeSlideDown 1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
      }

      .headline {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(3.2rem, 9vw, 6.5rem);
        font-weight: 300;
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: var(--text);
        margin-bottom: 0.8rem;
        opacity: 0;
        animation: fadeSlideDown 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.7s
          forwards;
      }

      .headline em {
        font-style: italic;
        color: var(--gold-light);
      }

      .subtitle {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1rem, 2.5vw, 1.3rem);
        font-weight: 300;
        font-style: italic;
        color: var(--text-muted);
        letter-spacing: 0.05em;
        margin-bottom: 2.8rem;
        opacity: 0;
        animation: fadeSlideDown 1s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2.8rem;
        opacity: 0;
        animation: fadeIn 1s ease 1.2s forwards;
      }
      .divider-line {
        width: 60px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold));
      }
      .divider-line.r {
        background: linear-gradient(90deg, var(--gold), transparent);
      }
      .divider-diamond {
        width: 6px;
        height: 6px;
        background: var(--gold);
        transform: rotate(45deg);
      }

      .cta-wrap {
        opacity: 0;
        animation: fadeSlideUp 1s cubic-bezier(0.22, 1, 0.36, 1) 1.4s forwards;
      }

      .cta {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 0.9rem;
        padding: 1.05rem 2.8rem;
        background: linear-gradient(
          135deg,
          var(--glass-bg) 0%,
          var(--glass-bg-strong) 100%
        );
        border: 1px solid var(--glass-border);
        border-top: 1px solid var(--glass-border-bright);
        border-left: 1px solid var(--glass-border-bright);
        border-radius: 60px;
        color: var(--gold-light);
        font-family: "Cinzel", serif;
        font-size: 0.7rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        text-decoration: none;
        cursor: pointer;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        box-shadow: var(--glass-shadow);
      }

      .cta::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(201, 169, 110, 0.2),
          rgba(255, 255, 255, 0.05)
        );
        opacity: 0;
        transition: opacity 0.4s ease;
        border-radius: inherit;
      }

      .cta::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.15),
          transparent
        );
        transition: left 0.7s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .cta:hover::before {
        opacity: 1;
      }

      .cta:hover::after {
        left: 150%;
      }

      .cta:hover {
        border-color: var(--glass-border-bright);
        border-top-color: rgba(255, 255, 255, 0.5);
        border-left-color: rgba(255, 255, 255, 0.5);
        transform: translateY(-4px) scale(1.02);
        box-shadow:
          0 20px 60px rgba(201, 169, 110, 0.2),
          0 0 0 1px rgba(255, 255, 255, 0.1),
          inset 0 0 30px rgba(255, 255, 255, 0.05);
      }

      .cta-arrow {
        display: inline-block;
        transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        font-style: normal;
      }
      .cta:hover .cta-arrow {
        transform: translateX(5px);
      }

      .corner {
        position: fixed;
        width: 60px;
        height: 60px;
        border-color: rgba(201, 169, 110, 0.18);
        border-style: solid;
        opacity: 0;
        animation: fadeIn 1s ease 2s forwards;
      }
      .corner-tl {
        top: 2rem;
        left: 2rem;
        border-width: 1px 0 0 1px;
      }
      .corner-tr {
        top: 2rem;
        right: 2rem;
        border-width: 1px 1px 0 0;
      }
      .corner-bl {
        bottom: 2rem;
        left: 2rem;
        border-width: 0 0 1px 1px;
      }
      .corner-br {
        bottom: 2rem;
        right: 2rem;
        border-width: 0 1px 1px 0;
      }

      .footer-note {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Cormorant Garamond", serif;
        font-size: 0.78rem;
        font-style: italic;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        opacity: 0;
        animation: fadeIn 1s ease 2.2s forwards;
        white-space: nowrap;
      }

      @keyframes fadeSlideDown {
        from {
          opacity: 0;
          transform: translateY(-22px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeSlideUp {
        from {
          opacity: 0;
          transform: translateY(22px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      body.leaving * {
        pointer-events: none;
      }
      body.leaving .scene {
        animation: pageExit 0.75s cubic-bezier(0.4, 0, 1, 1) forwards;
      }
      body.leaving .bg {
        animation: bgFade 0.75s ease forwards;
      }
      @keyframes pageExit {
        to {
          opacity: 0;
          transform: scale(0.96) translateY(-24px);
        }
      }
      @keyframes bgFade {
        to {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg">
      <div class="bg-gradient"></div>
      <div class="pattern"></div>
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="particles" id="particles"></div>
    </div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="scene">
      <div class="ornament">☽ &nbsp;✦&nbsp; ☾</div>
      <div class="tag">A special gift awaits you</div>
      <h1 class="headline">You've been<br /><em>thought of.</em></h1>
      <p class="subtitle">Something made with care, just for you</p>

      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-diamond"></span>
        <span class="divider-line r"></span>
      </div>

      <div class="cta-wrap">
        <a class="cta" id="openGift" href="#">
          Open your gift
          <span class="cta-arrow">&#8594;</span>
        </a>
      </div>
    </div>

    <p class="footer-note">made with love &nbsp;✦&nbsp; Eid 2026</p>

    <script>
      // Particles
      const container = document.getElementById("particles");
      for (let i = 0; i < 30; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        const size = 1 + Math.random() * 2;
        p.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${size}px; height: ${size}px;
        animation-duration: ${9 + Math.random() * 12}s;
        animation-delay: ${Math.random() * 12}s;
      `;
        container.appendChild(p);
      }

      // Transition to page 2
      document.getElementById("openGift").addEventListener("click", (e) => {
        e.preventDefault();
        document.body.classList.add("leaving");
        setTimeout(() => {
          window.location.href = "eid.html";
        }, 750);
      });
    </script>
  </body>
</html>
